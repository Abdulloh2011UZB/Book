<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#4b0082);
background-size:400% 400%;
animation:bg 12s ease infinite;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:800px;
padding:60px;
border-radius:25px;
background:rgba(255,255,255,.1);
backdrop-filter:blur(20px);
box-shadow:0 25px 50px rgba(0,0,0,.4);
text-align:center;
color:white;
animation:up 1s;
}

@keyframes up{
from{
opacity:0;
transform:translateY(60px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
font-size:55px;
margin-bottom:20px;
}

span{
color:#00e5ff;
}

p{
font-size:18px;
margin-bottom:35px;
opacity:.9;
}

a{
text-decoration:none;
padding:16px 40px;
background:#00e5ff;
color:black;
font-weight:bold;
border-radius:50px;
transition:.4s;
display:inline-block;
}

a:hover{
transform:scale(1.1);
box-shadow:0 0 35px cyan;
}

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,.08);
animation:move 15s linear infinite;
}

.c1{
width:300px;
height:300px;
left:-80px;
top:-80px;
}

.c2{
width:250px;
height:250px;
right:-60px;
bottom:-60px;
}

@keyframes move{
50%{
transform:translateY(-40px) rotate(180deg);
}
100%{
transform:translateY(0) rotate(360deg);
}
}

</style>

</head>

<body>

<div class="circle c1"></div>
<div class="circle c2"></div>

<div class="card">

<h1>📚 Welcome <span>Book Store</span></h1>

<p>
Professional Django Project <br>
Modern UI • Glass Effect • Animation
</p>

<a href="/book/">Get Started</a>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Books</title>

<style>

body{
    font-family: Arial;
    background: #f4f6f9;
}

.container{
    width: 900px;
    margin: auto;
}

.book-card{
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin: 15px 0;
    display: flex;
    gap: 20px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    align-items: center;
}

.book-card img{
    width: 120px;
    height: 160px;
    object-fit: cover;
    border-radius: 8px;
}

.btn{
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 6px;
    color: white;
    font-size: 14px;
}

.edit{
    background: #28a745;
}

.delete{
    background: #dc3545;
}

</style>
</head>

<body>

<div class="container">

<h2>{{ category.name }} kitoblari</h2>

{% for book in books %}

<div class="book-card">

    {% if book.image %}
        <img src="{{ book.image.url }}">
    {% endif %}

    <div>
        <h3>{{ book.title }}</h3>
        <p>✍ {{ book.author }}</p>

        <a href="{% url 'book_update' book.id %}" class="btn edit">Edit</a>
        <a href="{% url 'book_delete' book.id %}" class="btn delete">Delete</a>
    </div>

</div>

{% empty %}
<p>Kitob yo‘q</p>
{% endfor %}

</div>

</body>
</html>
